name = "assethub-worker"
main = "index.js"
compatibility_date = "2024-01-01"

# Bind your R2 bucket here
# Create the bucket in Cloudflare dashboard first: Storage & Databases → R2
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "assethub-assets"

# Set your public bucket URL as an environment variable
[vars]
R2_PUBLIC_URL = "https://pub-63cb42e78cd948583c3974681ff3ef47.r2.dev"
