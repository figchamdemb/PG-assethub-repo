<!--
  EXAMPLE: How your client's website reads content.json
  This is a plain HTML example — works the same in Astro, Next.js, etc.
  
  Put this in your client's repo (the one you connect in AssetHub Content Editor).
  When AssetHub pushes content.json, Cloudflare Pages rebuilds and this updates live.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barista Cafe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; }
    .hero { position: relative; height: 600px; overflow: hidden; }
    .hero img { width: 100%; height: 100%; object-fit: cover; }
    .hero-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); color: white; text-align: center; padding: 20px; }
    .hero-text h1 { font-size: 3rem; font-weight: 300; margin-bottom: 16px; }
    .hero-text p { font-size: 1.2rem; opacity: 0.9; max-width: 600px; }
    .hero-text button { margin-top: 24px; padding: 14px 32px; background: white; color: black; border: none; font-size: 1rem; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>

<section class="hero">
  <img id="hero-img" src="" alt="Hero" />
  <div class="hero-text">
    <h1 id="hero-heading">Loading…</h1>
    <p id="hero-sub"></p>
    <button id="hero-cta">Order now</button>
  </div>
</section>

<script>
  // Read content.json and populate the page
  // This file is in your repo root and updated by AssetHub
  fetch('/content.json')
    .then(r => r.json())
    .then(content => {
      const home = content.sections.find(s => s.page === 'index')
      if (!home) return

      const get = (key) => home.fields.find(f => f.key === key)?.value || ''

      document.getElementById('hero-heading').textContent = get('hero_heading')
      document.getElementById('hero-sub').textContent    = get('hero_subheading')
      document.getElementById('hero-cta').textContent    = get('hero_cta') || 'Order now'
      document.getElementById('hero-img').src            = get('hero_image')
    })
</script>

</body>
</html>
